## What is Flow Model?
### - Generative Models
### - Flow Model
]

.right-column[
A normalizing flow transforms a simple distribution into a complex one by 
applying a sequence of invertible transformation functions. 

Flowing through 
a chain of transformations, we repeatedly substitute the variable for the 
new one and eventually obtain 
a probability distribution of the final target variable.
<center>
  <img src="flow.png"  width=100%>
</center>
#### ---> Autoregressive Flows

```
If a flow transformation in a normalizing flow is framed as 
an autoregressive model — each dimension in a vector variable 
is conditioned on the previous dimensions — this is an 
autoregressive flow.

```
]

# Why Flow Model?

---

## Why Flow Model?
### - Stable Diffusion 3

Stable Diffusion 3 employs a .blue[Rectified Flow (RF)] formulation 
where data and noise are connected on a linear trajectory 
during training. This results in straighter inference paths, 
which then allow sampling with fewer steps. 

<center>
  <img src="diffflow.png" width=100%>
</center>

.footnote[.red[*]Research Paper can be found [here](https://arxiv.org/pdf/2403.03206)]
