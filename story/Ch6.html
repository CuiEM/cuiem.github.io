    <h1>《人祖传》</h1>
    <h2>第六章：信念的光</h2>

    <p>人祖难以忍受孤独之心，因此抠下双眼，化为一儿一女。这才稍稍排解了孤苦寂寞。</p>

    <p>是好景不长，这对子女渐渐贪恋起世间的景色，将父亲人祖望之脑后，常常嬉戏玩耍忘了时间，更忘了照顾人祖。</p>

    <p>人祖看不见任何的东西，眼中一片黑暗。但有时候，他竟能看到一点点的光亮。对此，他疑惑万分，向态度蛊请教。态度蛊便告诉他说：“哦，这是信念蛊发出来的不朽光芒。”</p>
